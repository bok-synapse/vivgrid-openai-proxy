name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"        # triggers on semantic version tags, e.g. v1.2.3
  pull_request:
    branches: [main]   # build only (no push) for PRs so you can catch breaks early

env:
  REGISTRY: ghcr.io
  # github.repository resolves to  <your-username>/vivgrid-openai-proxy
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write     # needed to push to ghcr.io
      id-token: write     # needed for OIDC provenance attestation (optional but good practice)

    steps:
      # ── 1. Source code ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Multi-platform builder ────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Authenticate to GitHub Container Registry ─────────────────────────
      #        Skipped on pull requests so forked PRs can't exfiltrate tokens
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by GitHub Actions

      # ── 4. Derive image tags & OCI labels ────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # latest on default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # short git SHA for every push (e.g. sha-abc1234)
            type=sha,prefix=sha-
            # branch name (e.g. main)
            type=ref,event=branch
            # PR number (e.g. pr-42)
            type=ref,event=pr
            # semver from tag (e.g. 1.2.3 and 1.2)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ── 5. Build & push ───────────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching via GitHub Actions cache – speeds up subsequent builds
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── 6. Summary ────────────────────────────────────────────────────────────
      - name: Print image digest
        if: github.event_name != 'pull_request'
        run: echo "Image digest ${{ steps.build-and-push.outputs.digest }}"
